<div class="card" style="background: linear-gradient(135deg, #11998e, #38ef7d); color: white; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0;">🏝️ Eco Resort <span id="star-display" style="color: #f1c40f; font-size: 18px;">⭐</span></h2>
        <button onclick="window.inviteFriends()" style="background: rgba(255,255,255,0.2); color: white; border: 1px solid white; font-size: 12px; padding: 6px 10px;">
            👥 Mời bạn
        </button>
    </div>
    <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-top: 15px;">
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
            <span>💰 <span id="home-scoin">0</span> Scoin</span>
            <span style="color: #a7f3d0;">📈 +<span id="home-income">0</span>/h</span>
        </div>
    </div>
</div>

<div style="display: flex; justify-content: space-between; align-items: center; padding: 0 15px;">
    <h3 style="color: #2c3e50; font-size: 15px;">Tài sản của tôi</h3>
    <button onclick="window.openShop()" style="background: #3498db; color: white; padding: 8px 15px; font-size: 13px;">
        🛒 Mở Cửa Hàng
    </button>
</div>

<div id="owned-grid" class="grid-2" style="padding: 0 15px;"></div>

<div id="shop-modal" class="modal-overlay" onclick="if(event.target==this) window.closeShop()">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin:0;">🛒 Cửa Hàng & Nâng Cấp</h3>
            <button onclick="window.closeShop()" style="background: #e74c3c; color: white; padding: 5px 15px; font-size: 14px; border-radius: 8px;">Đóng X</button>
        </div>
        <div id="shop-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>
</div>
