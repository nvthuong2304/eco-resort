<div class="card" style="background: linear-gradient(135deg, #064e3b, #065f46); color: white;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0;">🏝️ Eco Resort</h2>
        <span id="resort-level" style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px;">Cấp 1</span>
    </div>
    <div class="stat-grid" style="margin-top: 15px;">
        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;">
            <div style="font-size: 12px; opacity: 0.8;">Ví Scoin</div>
            <div style="font-size: 18px; font-weight: bold;"><span id="display-scoin">0</span></div>
        </div>
        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;">
            <div style="font-size: 12px; opacity: 0.8;">Lợi nhuận</div>
            <div style="font-size: 18px; font-weight: bold;">+<span id="display-income">0</span>/h</div>
        </div>
    </div>
</div>

<h3 style="padding-left: 5px;">🏗️ Xây dựng công trình</h3>

<div class="card">
    <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 35px;">🏠</span>
        <div style="flex-grow: 1;">
            <h4 style="margin:0;">Bungalow Gỗ</h4>
            <p style="margin:0; font-size: 13px; color: #64748b;">+100 SC/giờ</p>
        </div>
        <div style="text-align: right;">
            <b style="color: #10b981;">1,000 SC</b>
        </div>
    </div>
    <button class="btn-buy" onclick="buyBuilding('Bungalow Gỗ', 1000, 100)">Xây dựng</button>
</div>

<div class="card">
    <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 35px;">🍴</span>
        <div style="flex-grow: 1;">
            <h4 style="margin:0;">Nhà Hàng Biển</h4>
            <p style="margin:0; font-size: 13px; color: #64748b;">+650 SC/giờ</p>
        </div>
        <div style="text-align: right;">
            <b style="color: #10b981;">5,000 SC</b>
        </div>
    </div>
    <button class="btn-buy" onclick="buyBuilding('Nhà Hàng', 5000, 650)">Xây dựng</button>
</div>

<div class="card" style="border: 2px solid #3b82f6;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 35px;">🚁</span>
        <div style="flex-grow: 1;">
            <h4 style="margin:0;">Sân Bay Trực Thăng</h4>
            <p style="margin:0; font-size: 13px; color: #64748b;">+15,000 SC/giờ</p>
        </div>
        <div style="text-align: right;">
            <b style="color: #10b981;">100,000 SC</b>
        </div>
    </div>
    <button class="btn-buy" onclick="buyBuilding('Sân Bay', 100,000, 15000)" style="background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 4px 0 #1d4ed8;">Xây dựng</button>
</div>
