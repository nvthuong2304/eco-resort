<div class="card" style="background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center;">
    <h3 style="margin:0;">🏢 Văn Phòng Kế Toán</h3>
    <p style="opacity: 0.8; font-size: 13px; margin-top: 5px;">Số dư tài sản thực</p>
    <h1 style="margin: 10px 0; color: #fbbf24; font-size: 32px;"><span id="off-vcoin">0</span> Vcoin</h1>
</div>

<div class="card">
    <h4 style="margin-top:0; color: #333; font-size: 15px;">📢 Nhiệm vụ Hệ thống</h4>
    <p style="font-size: 13px; color: #64748b;">Tham gia cộng đồng để nhận vốn khởi nghiệp.</p>
    <button onclick="window.joinTelegramTask()" style="width: 100%; background: #0088cc; color: white; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 12px; border-radius: 10px;">
        <span>✈️</span> Tham gia Group (+10,000 Scoin)
    </button>
</div>

<div class="card">
    <h4 style="margin-top:0; color: #333; font-size: 15px;">🏦 Rút Vcoin Về Ngân Hàng</h4>
    <input type="text" id="bank-name" placeholder="Tên Ngân hàng / Ví điện tử">
    <input type="text" id="bank-acc" placeholder="Số tài khoản / Số điện thoại">
    <input type="number" id="draw-val" placeholder="Số lượng rút (Tối thiểu 50,000 Vcoin)">
    
    <button onclick="window.handleWithdraw()" style="width: 100%; background: #10b981; color: white; padding: 12px; border-radius: 10px; font-weight: bold;">TẠO LỆNH RÚT</button>
</div>
