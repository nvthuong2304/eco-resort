<div class="card" style="background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center;">
    <h3 style="margin:0;">🏢 Văn Phòng Kế Toán</h3>
    <p style="opacity: 0.8; font-size: 13px; margin-top: 5px;">Số dư tài sản thực</p>
    <h1 style="margin: 10px 0; color: #fbbf24; font-size: 32px;"><span id="off-vcoin">0</span> Vcoin</h1>
</div>

<div class="card" style="border: 2px solid #f1c40f;">
    <h4 style="margin-top:0; color: #d35400; font-size: 15px; display: flex; align-items: center; gap: 8px;">
        <span>🤝</span> Hệ Thống Giới Thiệu
    </h4>
    <p style="font-size: 12px; color: #64748b; margin-top: 0;">Mời bạn bè nhận <b style="color: #27ae60;">+1,000 Scoin/người</b>. Hưởng vĩnh viễn doanh thu cấp dưới theo 3 tầng:</p>
    
    <div style="background: #f8fafc; border-radius: 8px; padding: 10px; font-size: 13px; margin-bottom: 12px;">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 5px; margin-bottom: 5px;">
            <span>🥇 F1 (5% Scoin)</span> <b style="color: #2980b9;">0 người</b>
        </div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 5px; margin-bottom: 5px;">
            <span>🥈 F2 (1% Scoin)</span> <b style="color: #2980b9;">0 người</b>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <span>🥉 F3 (0.3% Scoin)</span> <b style="color: #2980b9;">0 người</b>
        </div>
    </div>

    <button onclick="window.inviteFriends()" style="width: 100%; background: #f39c12; color: white; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px; box-shadow: 0 3px 0 #d68910;">
        🔗 LẤY LINK MỜI BẠN BÈ
    </button>
</div>

<div class="card">
    <h4 style="margin-top:0; color: #333; font-size: 15px;">🏦 Rút Vcoin Về Ngân Hàng</h4>
    <input type="text" id="bank-name" placeholder="Tên Ngân hàng / Ví điện tử">
    <input type="text" id="bank-acc" placeholder="Số tài khoản / Số điện thoại">
    <input type="number" id="draw-val" placeholder="Số lượng rút (Tối thiểu 50,000 Vcoin)">
    
    <button onclick="window.handleWithdraw()" style="width: 100%; background: #10b981; color: white; padding: 12px; border-radius: 10px; font-weight: bold;">TẠO LỆNH RÚT</button>
</div>
