<div class="card" style="background: linear-gradient(135deg, #f093fb, #f5576c); color: white; text-align:center;">
    <h3 style="margin:0;">💱 Trung Tâm Giao Dịch</h3>
    <div style="display: flex; justify-content: space-around; margin-top: 10px; font-size: 14px;">
        <div>Scoin: <b id="ex-scoin-bal" style="font-size: 1.2em;">0</b></div>
        <div>Vcoin: <b id="ex-vcoin-bal" style="font-size: 1.2em;">0</b></div>
    </div>
</div>

<div class="card">
    <h4 style="margin-top:0; color: #333;">📉 Bán Scoin lấy Vcoin</h4>
    <p style="font-size: 12px; color: #666; margin-top: 0;">Tỷ lệ: 10 Scoin = 1 Vcoin</p>
    <input type="number" id="sell-scoin-input" placeholder="Nhập số Scoin..." onkeyup="window.calcSell()">
    <div style="text-align: right; margin-bottom: 10px; font-size: 13px;">Nhận: <b id="sell-preview" style="color:#27ae60;">0</b> Vcoin</div>
    <button onclick="window.sellScoin()" style="width: 100%; background: #e74c3c; color: white;">BÁN SCOIN</button>
</div>

<div class="card">
    <h4 style="margin-top:0; color: #333;">📈 Mua Scoin bằng Vcoin</h4>
    <p style="font-size: 12px; color: #666; margin-top: 0;">Tỷ lệ: 1 Vcoin = 10 Scoin</p>
    <input type="number" id="buy-vcoin-input" placeholder="Nhập số Vcoin..." onkeyup="window.calcBuy()">
    <div style="text-align: right; margin-bottom: 10px; font-size: 13px;">Nhận: <b id="buy-preview" style="color:#2980b9;">0</b> Scoin</div>
    <button onclick="window.buyScoin()" style="width: 100%; background: #2980b9; color: white;">MUA SCOIN</button>
</div>
