<div class="card" style="background: linear-gradient(135deg, #f093fb, #f5576c); color: white;">
    <h3 style="margin:0;">💱 Trung Tâm Quy Đổi</h3>
    <p style="margin-top: 5px; font-size: 15px;">Scoin hiện có: <b id="ex-scoin" style="font-size: 1.3em;">0</b> Scoin</p>
    <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; font-size: 14px;">
        Tỷ giá: <b>1,000 Scoin = 800 Vcoin</b>
    </div>
</div>

<div class="card">
    <h4 style="margin-top:0; color: #333;">Nhập số lượng bán</h4>
    <input type="number" id="scoin-to-sell" placeholder="Tối thiểu 1,000 Scoin" onkeyup="window.calcVcoin()">
    
    <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid #e2e8f0;">
        <span style="color: #64748b; font-size: 14px;">Bạn sẽ nhận được</span><br>
        <b id="vcoin-preview" style="color: #10b981; font-size: 24px;">0</b> <b style="color: #10b981;">Vcoin</b>
    </div>
    
    <button onclick="window.processExchange()" style="width: 100%; background: #f5576c; color: white; padding: 12px; border-radius: 10px; font-weight: bold;">BÁN SCOIN</button>
</div>
