<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Resort Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-content"></div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="changeTab(this, 'build')">🏗️</button>
        <button class="nav-item" onclick="changeTab(this, 'exchange')">💱</button>
        <button class="nav-item" onclick="changeTab(this, 'office')">🏢</button>
    </nav>

    <script src="js/app.js"></script>
    <script>
        function changeTab(btn, tabName) {
            // Xóa class active ở tất cả các nút
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // Thêm active vào nút vừa bấm
            btn.classList.add('active');
            // Load tab
            loadTab(tabName);
        }
        
        window.onload = () => {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#064e3b');
        };
    </script>
</body>
</html>
