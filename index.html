<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Resort Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-content"></div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="changeTab(this, 'build')">
            <span class="icon">🏝️</span><span class="text">Trang chủ</span>
        </button>
        <button class="nav-item" onclick="changeTab(this, 'exchange')">
            <span class="icon">💱</span><span class="text">Sàn Vcoin</span>
        </button>
        <button class="nav-item" onclick="changeTab(this, 'office')">
            <span class="icon">🏢</span><span class="text">Văn phòng</span>
        </button>
    </nav>

    <script src="js/app.js"></script>
    <script>
        function changeTab(btn, tabName) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            window.loadTab(tabName);
        }
    </script>
</body>
</html>
